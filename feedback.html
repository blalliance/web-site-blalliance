<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votre Avis | BL Alliance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #D32F2F;
            --primary-hover: #B71C1C;
            --dark: #0a0a0a;
            --card-bg: #141414;
            --text: #ffffff;
            --accent: #FFD700; /* Or pour les étoiles */
            --border: rgba(211, 47, 47, 0.2);
        }

        body {
            background-color: var(--dark);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding-top: 100px;
            padding-bottom: 80px;
        }

        /* --- HEADER --- */
        header {
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%;
            background: rgba(0,0,0,0.95);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            box-sizing: border-box;
        }

        .logo-container { display: flex; align-items: center; gap: 12px; }
        .logo-container img { height: 40px; }
        .brand-name { color: var(--primary); font-size: 1.8rem; font-weight: 900; text-transform: uppercase; margin-left: 10px; }

        /* --- CONTAINER --- */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .feedback-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .feedback-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .feedback-header p { color: #888; font-size: 0.95rem; }

        /* --- FORM ELEMENTS --- */
        .feedback-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #222;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .form-group { margin-bottom: 25px; }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #ccc;
        }

        /* Star Rating System */
        .star-rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: center;
            gap: 10px;
            margin: 10px 0 20px;
        }

        .star-rating input { display: none; }

        .star-rating label {
            font-size: 2.5rem;
            color: #333;
            cursor: pointer;
            transition: 0.3s;
        }

        .star-rating label:hover,
        .star-rating label:hover ~ label,
        .star-rating input:checked ~ label {
            color: var(--accent);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        /* Inputs & Textarea */
        select, textarea {
            width: 100%;
            background: #0d0d0d;
            border: 1px solid #333;
            color: white;
            padding: 12px 15px;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
        }

        /*textarea { height: 120px; resize: vertical; }*/

        textarea { 
            height: 120px; 
            resize: none; /* Empêche l'étirement manuel par l'utilisateur */
            width: 100%;
            background: #0d0d0d;
            border: 1px solid #333;
            color: white;
            padding: 12px 15px;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
        }

        select:focus, textarea:focus {
            border-color: var(--primary);
            outline: none;
        }

        /* Checkbox Group */
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .checkbox-item {
            background: #0d0d0d;
            border: 1px solid #222;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .checkbox-item input { display: none; }

        .checkbox-item:has(input:checked) {
            background: var(--primary);
            border-color: var(--primary);
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(211, 47, 47, 0.4);
        }

        .anonymous-switch {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            color: #666;
            margin-top: 15px;
            justify-content: center;
        }

        /* --- FOOTER --- */
        .social-footer {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            padding: 15px 0;
            background: rgba(10, 10, 10, 0.95);
            border-top: 1px solid var(--border);
            text-align: center;
        }
        .social-footer p { color: #888; font-size: 13px; margin: 0; }

        /* --- RESET DU LIEN ET ACTIONS HEADER --- */
        .header-actions {
            display: flex;
            align-items: center;
        }

        /* 4. On force aussi le reset sur le lien parent pour être sûr */
        .btn-back-link {
            text-decoration: none !important;
            -webkit-tap-highlight-color: transparent;
            outline: none !important;
        }

        /* --- BOUTON ROND --- */
        .btn-back-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background-color: var(--primary);
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 10px rgba(211, 47, 47, 0.3);
            
            /* 1. Supprime le rectangle gris/bleu sur Android/iOS */
            -webkit-tap-highlight-color: transparent;
            -webkit-tap-highlight-color: rgba(0,0,0,0);
            
            /* 2. Supprime la bordure de focus (souvent bleue ou orange) */
            outline: none !important;
            
            /* 3. Empêche la sélection de texte parasite lors du clic répété */
            user-select: none;
            -webkit-user-select: none;
        }

        .btn-back-circle i {
            font-size: 1.1rem;
            transition: transform 0.3s ease, color 0.3s ease;
        }

        /* --- EFFET HOVER (PC) --- */
        @media (hover: hover) {
            .btn-back-circle:hover {
                background-color: white;
                /*transform: scale(1.1);
                box-shadow: 0 6px 15px rgba(255, 255, 255, 0.2);*/
            }
            
            .btn-back-circle:hover i {
                color: var(--primary);
                /*transform: translateX(-3px);*/
            }
        }

        /* --- EFFET CLIC / ACTIVE (Mobile & Tablette) --- */
        /* 5. Feedback propre : le bouton change de couleur SANS le carré */
        .btn-back-circle:active {
            background-color: white !important;
            transform: scale(0.9);
        }

        .btn-back-circle:active i {
            color: var(--primary) !important;
        }

        /* --- ADAPTATION RESPONSIVE --- */
        @media (max-width: 480px) {
            .btn-back-circle {
                width: 38px;
                height: 38px;
            }
            
            .btn-back-circle i {
                font-size: 0.95rem;
            }
            
            .brand-name {
                font-size: 1.4rem; /* Réduction légère du nom pour laisser de la place au bouton sur petit écran */
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <a href="index.html" style="display: flex; align-items: center; text-decoration: none;">
                <img src="assets/logo2.png" alt="BL Alliance">
                <span class="brand-name">BL Alliance</span>
            </a>
        </div>
        <div class="header-actions">
            <a href="dashboard.html" class="btn-back-link">
                <button class="btn-back-circle" title="Retour au Dashboard">
                    <i class="fas fa-angles-left"></i>
                </button>
            </a>
        </div>

    </header>

    <div class="container">
        <div class="feedback-header">
            <h1>Votre Expérience</h1>
            <p>Aidez-nous à parfaire l'excellence de notre service de courtage.</p>
        </div>

        <form class="feedback-card" id="feedbackForm">
            
            <div class="form-group" style="text-align: center;">
                <label>Note globale de l'agence</label>
                <div class="star-rating">
                    <input type="radio" id="star5" name="rating" value="5"><label for="star5" title="Excellent"><i class="fas fa-star"></i></label>
                    <input type="radio" id="star4" name="rating" value="4"><label for="star4" title="Très bon"><i class="fas fa-star"></i></label>
                    <input type="radio" id="star3" name="rating" value="3"><label for="star3" title="Moyen"><i class="fas fa-star"></i></label>
                    <input type="radio" id="star2" name="rating" value="2"><label for="star2" title="Passable"><i class="fas fa-star"></i></label>
                    <input type="radio" id="star1" name="rating" value="1"><label for="star1" title="Insatisfaisant"><i class="fas fa-star"></i></label>
                </div>
            </div>

            <div class="form-group">
                <label>Qu'avez-vous le plus apprécié ?</label>
                <div class="checkbox-group">
                    <label class="checkbox-item"><input type="checkbox"> La discrétion</label>
                    <label class="checkbox-item"><input type="checkbox"> Qualité des profils</label>
                    <label class="checkbox-item"><input type="checkbox"> Design de l'appli</label>
                    <label class="checkbox-item"><input type="checkbox"> Rapidité du matching</label>
                    <label class="checkbox-item"><input type="checkbox"> Accompagnement</label>
                </div>
            </div>

            <div class="form-group">
                <label for="subject">Sujet de votre retour</label>
                <select id="subject" name="subject">
                    <option value="general">Avis général</option>
                    <option value="tech">Problème technique / Application</option>
                    <option value="success">Témoignage de réussite</option>
                    <option value="suggestion">Suggestion d'amélioration</option>
                    <option value="complaint">Réclamation</option>
                </select>
            </div>

            <div class="form-group">
                <label for="comment">Votre message</label>
                <textarea id="comment" name="comment" placeholder="Partagez votre expérience avec nous..."></textarea>
            </div>

            <button type="submit" class="btn-submit">Envoyer mon témoignage</button>

            <div class="anonymous-switch">
                <input type="checkbox" id="anon">
                <label for="anon" style="margin:0;">Publier mon témoignage de façon anonyme</label>
            </div>

        </form>
    </div>

    <footer class="social-footer">
        <p>© 2026 BL Alliance — Agence de Courtage Matrimonial. Tous droits réservés.</p>
    </footer>

    <script>
        document.getElementById('feedbackForm').onsubmit = function(e) {
            e.preventDefault();
            alert("Merci ! Votre feedback a été transmis à la direction de BL Alliance.");
            window.location.href = "dashboard.html";
        };
    </script>

</body>
</html>
